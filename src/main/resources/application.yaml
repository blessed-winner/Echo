server:
  port: ${PORT:8080}

spring:
  application:
    name: echo
  datasource:
    url: ${JDBC_DATABASE_URL:${DB_URL}}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
  jwt:
    secret: ${JWT_SECRET}
    accessTokenExpiration: 600
    refreshTokenExpiration: 604800

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: Ov23liWx0H2whnRBwPml
            client-secret: 55a73d6035818bc8869c631b47d102ad653aeea2
